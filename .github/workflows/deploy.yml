name: Deploy to roadmap.sadken.co.uk

on:
  push:
    branches: [main]
  workflow_dispatch:    # also allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to home server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/roadmap
            git pull origin main
            ~/homeserver/deploy.sh ~/apps/roadmap

      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
        run: |
          # Look up zone ID for sadken.co.uk
          ZONE_ID=$(curl -sf "https://api.cloudflare.com/client/v4/zones?name=sadken.co.uk" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")

          # Purge all cached assets for roadmap.sadken.co.uk
          RESULT=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://roadmap.sadken.co.uk/",
                "https://roadmap.sadken.co.uk/index.html",
                "https://roadmap.sadken.co.uk/js/app.js",
                "https://roadmap.sadken.co.uk/css/style.css",
                "https://roadmap.sadken.co.uk/data/hampshire.geojson",
                "https://roadmap.sadken.co.uk/favicon.svg"
              ]
            }' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ Cache purged' if d['success'] else f'✗ Purge failed: {d}')")
          echo "$RESULT"
