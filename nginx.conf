server {
    listen 80;
    server_name _;

    # Proxy /dft/* → data.dft.gov.uk
    # Server-side proxy avoids CORS — no third-party proxy (allorigins.win etc.) needed.
    # The DfT CSV files are large (~50MB+) so we bump timeouts and buffer sizes.
    location /dft/ {
        proxy_pass            https://data.dft.gov.uk/;
        proxy_ssl_server_name on;
        proxy_set_header      Host data.dft.gov.uk;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      Accept-Encoding "";
        proxy_read_timeout    120s;
        proxy_connect_timeout 15s;
        proxy_buffer_size     128k;
        proxy_buffers         8 256k;
        proxy_busy_buffers_size 512k;
    }

    # HTML — never cache; always fetch fresh so deploys take effect immediately
    location ~* \.html$ {
        root  /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Static assets — cache for 1 day; Cloudflare purge handles invalidation on deploy
    location ~* \.(js|css|json|svg|ico|png|jpg|webp|woff2?)$ {
        root  /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
